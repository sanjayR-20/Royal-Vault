<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curated Gold | The Regal Radiance</title>
    <style>
        /* Baseline Reset */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #ffffff;
            color: #333333;
            overflow-x: hidden; /* Prevents horizontal scroll from Framer overflow */
        }

        /* Hero Iframe Module */
        .framer-hero-container {
            width: 100vw;
            height: 100vh; /* Forces the iframe to take the full screen height */
            position: relative;
            display: block;
        }

        .framer-embed {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Scalable Module for Future Implementation */
        .content-architecture {
            padding: 5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Interactive Framer Hero Section -->
    <main>
        <section class="framer-hero-container">
            <iframe 
                src="https://jubilant-agency-875738.framer.app/" 
                class="framer-embed"
                title="Regal Radiance Hover Reveal"
                loading="lazy"
                allow="autoplay; fullscreen"
            ></iframe>
        </section>

        <!-- Staging Area for Subsequent Development Phases -->
        <section class="content-architecture">
            <h2>System Architecture Ready</h2>
            <p>Deploy additional content modules, catalog grids, and operational specs below the fold.</p>
        </section>
    </main>

</body>
</html>
