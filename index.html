<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curated Gold | The Regal Radiance</title>
    <style>
        /* Baseline Reset */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #050505;
            --surface: rgba(10, 10, 10, 0.82);
            --surface-strong: #0a0a0a;
            --text: #f5f1e8;
            --muted: #a7a29a;
            --accent: #d28c2c;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* Hero Iframe Module */
        .framer-hero-container {
            width: 100%;
            min-height: 100svh;
            position: relative;
            display: block;
        }

        .framer-embed {
            width: 100%;
            min-height: 100svh;
            height: 100%;
            border: none;
            display: block;
        }

        .navbar {
            position: fixed;
            top: 1.25rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            width: min(92vw, 36rem);
            padding: 0.9rem 1.1rem;
            border: 1px solid rgba(245, 241, 232, 0.14);
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(14, 14, 14, 0.88), rgba(8, 8, 8, 0.74));
            backdrop-filter: blur(18px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
        }

        .brand {
            position: absolute;
            left: 1.1rem;
            letter-spacing: 0.34em;
            text-transform: uppercase;
            font-size: 0.78rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .menu-toggle {
            appearance: none;
            border: 0;
            background: transparent;
            color: var(--text);
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.34rem;
            width: 3rem;
            height: 3rem;
            border-radius: 999px;
            cursor: pointer;
            transition: background-color 180ms ease, transform 180ms ease;
        }

        .menu-toggle:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .menu-toggle span {
            width: 1.35rem;
            height: 2px;
            border-radius: 999px;
            background: currentColor;
            transition: transform 220ms ease, opacity 220ms ease;
            transform-origin: center;
        }

        .menu-toggle.is-open span:nth-child(1) {
            transform: translateY(6px) rotate(45deg);
        }

        .menu-toggle.is-open span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.is-open span:nth-child(3) {
            transform: translateY(-6px) rotate(-45deg);
        }

        .menu-overlay {
            position: fixed;
            inset: 0;
            z-index: 40;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 7rem 1.5rem 2.5rem;
            background:
                radial-gradient(circle at top, rgba(210, 140, 44, 0.12), transparent 34%),
                linear-gradient(180deg, rgba(10, 10, 10, 0.96), rgba(5, 5, 5, 0.99));
            transform-origin: top center;
            transform: scaleY(0);
            opacity: 0;
            pointer-events: none;
            transition: transform 500ms cubic-bezier(0.76, 0, 0.24, 1), opacity 260ms ease;
        }

        .menu-overlay.is-open {
            transform: scaleY(1);
            opacity: 1;
            pointer-events: auto;
        }

        .menu-links {
            width: min(100%, 40rem);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: center;
        }

        .menu-link-row {
            overflow: hidden;
            width: 100%;
            text-align: center;
        }

        .menu-link {
            display: inline-block;
            font-size: clamp(2.4rem, 6vw, 4.8rem);
            font-weight: 300;
            letter-spacing: -0.06em;
            color: var(--text);
            transform: translateY(110%);
            transition: transform 400ms cubic-bezier(0.215, 0.61, 0.355, 1), color 200ms ease;
        }

        .menu-overlay.is-open .menu-link {
            transform: translateY(0);
        }

        .menu-link:hover {
            color: var(--accent);
        }

        .menu-footer {
            position: absolute;
            left: 50%;
            bottom: 2rem;
            transform: translateX(-50%);
            color: var(--muted);
            font-size: 0.72rem;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            text-align: center;
        }

        /* Scalable Module for Future Implementation */
        .content-architecture {
            padding: 5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="brand">AURA VAULT</div>
        <button class="menu-toggle" id="menuToggle" aria-expanded="false" aria-controls="menuOverlay" aria-label="Toggle navigation menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <nav class="menu-overlay" id="menuOverlay" aria-hidden="true">
        <div class="menu-links">
            <div class="menu-link-row">
                <a class="menu-link" href="/catalog">The Vault</a>
            </div>
            <div class="menu-link-row">
                <a class="menu-link" href="/purity">Our Purity</a>
            </div>
            <div class="menu-link-row">
                <a class="menu-link" href="/process">How It Works</a>
            </div>
            <div class="menu-link-row">
                <a class="menu-link" href="/admin">Admin Portal</a>
            </div>
        </div>

        <div class="menu-footer">©2026 AURA VAULT SYSTEMS INC.</div>
    </nav>

    <!-- Interactive Framer Hero Section -->
    <main>
        <section class="framer-hero-container">
            <iframe 
                src="https://jubilant-agency-875738.framer.app/" 
                class="framer-embed"
                title="Regal Radiance Hover Reveal"
                loading="lazy"
                allow="autoplay; fullscreen"
            ></iframe>
        </section>

        <!-- Staging Area for Subsequent Development Phases -->
        <section class="content-architecture">
            <h2>System Architecture Ready</h2>
            <p>Deploy additional content modules, catalog grids, and operational specs below the fold.</p>
        </section>
    </main>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuLinks = menuOverlay.querySelectorAll('a');

        function setMenuState(isOpen) {
            menuToggle.classList.toggle('is-open', isOpen);
            menuOverlay.classList.toggle('is-open', isOpen);
            menuToggle.setAttribute('aria-expanded', String(isOpen));
            menuOverlay.setAttribute('aria-hidden', String(!isOpen));
        }

        menuToggle.addEventListener('click', () => {
            setMenuState(!menuOverlay.classList.contains('is-open'));
        });

        menuLinks.forEach((link) => {
            link.addEventListener('click', () => setMenuState(false));
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                setMenuState(false);
            }
        });
    </script>

</body>
</html>
