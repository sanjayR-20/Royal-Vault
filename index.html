<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curated Gold | The Regal Radiance</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23050505'/%3E%3Cpath d='M18 42V22h8.4c6.2 0 10 3.8 10 10s-3.8 10-10 10H18Zm6-5.2h2.1c3.1 0 5.4-2 5.4-4.8 0-2.9-2.3-4.8-5.4-4.8H24v9.6Zm19.8 5.2h-6.1V22h6.1v20Z' fill='%23f5f1e8'/%3E%3C/svg%3E">
    <style>
        /* Baseline Reset */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #050505;
            --surface: rgba(10, 10, 10, 0.82);
            --surface-strong: #0a0a0a;
            --text: #f5f1e8;
            --muted: #a7a29a;
            --accent: #d28c2c;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* Hero Iframe Module */
        .framer-hero-container {
            background: #f0ede6;
            width: 100%;
            min-height: 100svh;
            position: relative;
            display: block;
        }

        .framer-embed {
            width: 100%;
            min-height: 100svh;
            height: 100%;
            border: none;
            display: block;
        }

        .navbar {
            position: fixed;
            top: 1.25rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            width: min(92vw, 36rem);
            padding: 0.9rem 1.1rem;
            border: 1px solid rgba(245, 241, 232, 0.14);
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(14, 14, 14, 0.88), rgba(8, 8, 8, 0.74));
            backdrop-filter: blur(18px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
        }

        .brand {
            position: absolute;
            left: 1.1rem;
            letter-spacing: 0.34em;
            text-transform: uppercase;
            font-size: 0.78rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .menu-toggle {
            appearance: none;
            border: 0;
            background: transparent;
            color: var(--text);
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.34rem;
            width: 3rem;
            height: 3rem;
            border-radius: 999px;
            cursor: pointer;
            transition: background-color 180ms ease, transform 180ms ease;
        }

        .menu-toggle:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .menu-toggle span {
            width: 1.35rem;
            height: 2px;
            border-radius: 999px;
            background: currentColor;
            transition: transform 220ms ease, opacity 220ms ease;
            transform-origin: center;
        }

        .menu-toggle.is-open span:nth-child(1) {
            transform: translateY(6px) rotate(45deg);
        }

        .menu-toggle.is-open span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.is-open span:nth-child(3) {
            transform: translateY(-6px) rotate(-45deg);
        }

        .menu-overlay {
            position: fixed;
            inset: 0;
            z-index: 40;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 7rem 1.5rem 2.5rem;
            background:
                radial-gradient(circle at top, rgba(210, 140, 44, 0.12), transparent 34%),
                linear-gradient(180deg, rgba(10, 10, 10, 0.96), rgba(5, 5, 5, 0.99));
            transform-origin: top center;
            transform: scaleY(0);
            opacity: 0;
            pointer-events: none;
            transition: transform 500ms cubic-bezier(0.76, 0, 0.24, 1), opacity 260ms ease;
        }

        .menu-overlay.is-open {
            transform: scaleY(1);
            opacity: 1;
            pointer-events: auto;
        }

        .menu-links {
            width: min(100%, 40rem);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: center;
        }

        .menu-link-row {
            overflow: hidden;
            width: 100%;
            text-align: center;
        }

        .menu-link {
            display: inline-block;
            font-size: clamp(2.4rem, 6vw, 4.8rem);
            font-weight: 300;
            letter-spacing: -0.06em;
            color: var(--text);
            transform: translateY(110%);
            transition: transform 400ms cubic-bezier(0.215, 0.61, 0.355, 1), color 200ms ease;
        }

        .menu-overlay.is-open .menu-link {
            transform: translateY(0);
        }

        .menu-link:hover {
            color: var(--accent);
        }

        .menu-footer {
            position: absolute;
            left: 50%;
            bottom: 2rem;
            transform: translateX(-50%);
            color: var(--muted);
            font-size: 0.72rem;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            text-align: center;
        }

        /* Editorial Minimalist Section */
        .minimalist-aesthetic {
            position: relative;
            min-height: 100svh;
            padding: clamp(4.5rem, 8vw, 7rem) clamp(1.25rem, 5vw, 4rem);
            background: #efe4d1;
            color: #8a5209;
            overflow: hidden;
        }

        .minimalist-aesthetic::before {
            content: "";
            position: absolute;
            top: 1.35rem;
            left: clamp(1.5rem, 6vw, 4.5rem);
            width: 2.7rem;
            height: 2.7rem;
            background:
                linear-gradient(#8a5209, #8a5209) 50% 0 / 2px 100% no-repeat,
                linear-gradient(90deg, #8a5209, #8a5209) 0 50% / 100% 2px no-repeat;
            transform: rotate(45deg);
            opacity: 0.95;
        }

        .minimalist-grid {
            position: relative;
            display: grid;
            grid-template-columns: minmax(15rem, 0.86fr) minmax(17rem, 1fr) minmax(18rem, 1.15fr);
            grid-template-rows: 10.75rem 7.4rem 9rem 9rem;
            gap: clamp(1rem, 2.4vw, 2rem);
            width: min(100%, 72rem);
            margin: 0 auto;
        }

        .aesthetic-image {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .aesthetic-image.is-tall {
            grid-column: 1;
            grid-row: 1 / 5;
            object-position: center top;
        }

        .aesthetic-image.is-top {
            grid-column: 2;
            grid-row: 1 / 3;
            object-position: center 18%;
        }

        .aesthetic-image.is-wide {
            grid-column: 2 / 4;
            grid-row: 3 / 5;
            object-position: center 26%;
        }

        .gold-disc {
            position: absolute;
            top: 39%;
            left: 20%;
            width: clamp(4.2rem, 7vw, 5.3rem);
            aspect-ratio: 1;
            border-radius: 50%;
            background: #b9975f;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        .minimalist-title {
            grid-column: 3;
            grid-row: 1 / 3;
            align-self: center;
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(3.5rem, 7vw, 6.5rem);
            font-weight: 400;
            line-height: 0.86;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .aesthetic-word {
            position: absolute;
            right: 1.5rem;
            bottom: 0.25rem;
            z-index: 3;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(4.8rem, 12vw, 10rem);
            font-weight: 400;
            line-height: 0.8;
            letter-spacing: 0;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .edition-mark {
            position: absolute;
            right: 18%;
            top: 43%;
            width: clamp(7rem, 12vw, 9.5rem);
            height: clamp(7rem, 12vw, 9.5rem);
            color: #b18c57;
        }

        .edition-mark svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .edition-mark text {
            fill: currentColor;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 0.78rem;
            letter-spacing: 0.36em;
        }

        .edition-mark polygon {
            fill: currentColor;
        }

        .aesthetic-year {
            position: absolute;
            right: clamp(1rem, 5vw, 4.5rem);
            bottom: 16%;
            color: rgba(138, 82, 9, 0.24);
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(3rem, 7vw, 5.2rem);
            font-style: italic;
            line-height: 0.78;
            text-align: center;
        }

        @media (max-width: 900px) {
            .minimalist-aesthetic {
                min-height: auto;
                padding-bottom: 6rem;
            }

            .minimalist-grid {
                grid-template-columns: 0.92fr 1fr;
                grid-template-rows: auto 14rem 12rem 12rem auto;
                gap: 1rem;
            }

            .minimalist-title {
                grid-column: 1 / 3;
                grid-row: 1;
                justify-self: end;
                max-width: 8ch;
                text-align: right;
            }

            .aesthetic-image.is-tall {
                grid-column: 1;
                grid-row: 2 / 5;
            }

            .aesthetic-image.is-top {
                grid-column: 2;
                grid-row: 2;
            }

            .aesthetic-image.is-wide {
                grid-column: 2;
                grid-row: 3 / 5;
            }

            .gold-disc {
                top: 55%;
                left: 43%;
            }

            .edition-mark {
                right: 4%;
                top: 46%;
            }

            .aesthetic-word {
                right: 0;
                bottom: -1.5rem;
            }
        }

        @media (max-width: 640px) {
            .minimalist-aesthetic {
                padding-top: 8.75rem;
            }

            .minimalist-aesthetic::before {
                top: 5.75rem;
                width: 2.1rem;
                height: 2.1rem;
            }

            .minimalist-grid {
                grid-template-columns: 1fr;
                grid-template-rows: auto 23rem 12rem 13rem auto;
                width: min(100%, 28rem);
            }

            .minimalist-title,
            .aesthetic-image.is-tall,
            .aesthetic-image.is-top,
            .aesthetic-image.is-wide {
                grid-column: 1;
            }

            .minimalist-title {
                grid-row: 1;
                justify-self: start;
                max-width: none;
                text-align: left;
            }

            .aesthetic-image.is-tall {
                grid-row: 2;
            }

            .aesthetic-image.is-top {
                grid-row: 3;
            }

            .aesthetic-image.is-wide {
                grid-row: 4;
            }

            .gold-disc {
                top: 46%;
                left: 88%;
                width: 4rem;
            }

            .edition-mark {
                position: relative;
                grid-row: 5;
                right: auto;
                top: auto;
                justify-self: end;
                width: 6.5rem;
                height: 6.5rem;
            }

            .aesthetic-word {
                position: relative;
                grid-row: 6;
                right: auto;
                bottom: auto;
                font-size: clamp(3.5rem, 15vw, 5.2rem);
            }

            .aesthetic-year {
                right: 1.25rem;
                bottom: 4.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="brand">AURA VAULT</div>
        <button class="menu-toggle" id="menuToggle" aria-expanded="false" aria-controls="menuOverlay" aria-label="Toggle navigation menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <nav class="menu-overlay" id="menuOverlay" aria-hidden="true">
        <div class="menu-links">
            <div class="menu-link-row">
                <a class="menu-link" href="/catalog">The Vault</a>
            </div>
            <div class="menu-link-row">
                <a class="menu-link" href="/purity">Our Purity</a>
            </div>
            <div class="menu-link-row">
                <a class="menu-link" href="/process">How It Works</a>
            </div>
            <div class="menu-link-row">
                <a class="menu-link" href="/admin">Admin Portal</a>
            </div>
        </div>

        <div class="menu-footer">©2026 AURA VAULT SYSTEMS INC.</div>
    </nav>

    <!-- Interactive Framer Hero Section -->
    <main>
        <section class="framer-hero-container">
            <iframe 
                src="https://jubilant-agency-875738.framer.app/" 
                class="framer-embed"
                title="Regal Radiance Hover Reveal"
                loading="lazy"
                allow="autoplay; fullscreen"
            ></iframe>
        </section>

        <section class="minimalist-aesthetic" aria-labelledby="minimalistTitle">
            <div class="minimalist-grid">
                <img class="aesthetic-image is-tall" src="resource/download.jpg" alt="Layered gold bridal jewelry portrait">
                <img class="aesthetic-image is-top" src="resource/beautiful traditional attire.jpg" alt="Traditional gold necklace and earrings">
                <img class="aesthetic-image is-wide" src="resource/Heavy Embellished Bridal Saree.jpg" alt="Gold saree with ornament set">
                <div class="gold-disc" aria-hidden="true"></div>

                <h2 class="minimalist-title" id="minimalistTitle">Minimalist</h2>

                <div class="edition-mark" aria-hidden="true">
                    <svg viewBox="0 0 140 140" role="img">
                        <defs>
                            <path id="editionCircle" d="M70,70 m-50,0 a50,50 0 1,1 100,0 a50,50 0 1,1 -100,0"></path>
                        </defs>
                        <text>
                            <textPath href="#editionCircle">LIMITED EDITION LIMITED EDITION</textPath>
                        </text>
                        <polygon points="70,41 78,62 99,70 78,78 70,99 62,78 41,70 62,62"></polygon>
                    </svg>
                </div>

                <div class="aesthetic-year" aria-hidden="true">20<br>25</div>
                <div class="aesthetic-word">Aesthetic</div>
            </div>
        </section>
    </main>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuLinks = menuOverlay.querySelectorAll('a');

        function setMenuState(isOpen) {
            menuToggle.classList.toggle('is-open', isOpen);
            menuOverlay.classList.toggle('is-open', isOpen);
            menuToggle.setAttribute('aria-expanded', String(isOpen));
            menuOverlay.setAttribute('aria-hidden', String(!isOpen));
        }

        menuToggle.addEventListener('click', () => {
            setMenuState(!menuOverlay.classList.contains('is-open'));
        });

        menuLinks.forEach((link) => {
            link.addEventListener('click', () => setMenuState(false));
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                setMenuState(false);
            }
        });
    </script>

</body>
</html>
